server {
    listen 80;
    server_name localhost;
    client_max_body_size 50M;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_intercept_errors on;
        error_page 413 = @error413;
        error_page 502 = @error502;
        error_page 503 = @error503;
        error_page 504 = @error504;
    }

    location @error413 {
        default_type application/json;
        return 413 '{"error": "Payload Too Large", "message": "File exceeds the maximum allowed limit."}';
    }

    location @error502 {
        default_type application/json;
        return 502 '{"error": "Bad Gateway", "message": "Backend service is currently unreachable."}';
    }

    location @error503 {
        default_type application/json;
        return 503 '{"error": "Service Unavailable", "message": "Backend service is temporarily unavailable."}';
    }

    location @error504 {
        default_type application/json;
        return 504 '{"error": "Gateway Timeout", "message": "Backend service took too long to respond."}';
    }
}
