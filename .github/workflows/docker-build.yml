name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  # Docker Hub doesn't require a specific registry prefix in the tag (it defaults to docker.io)
  IMAGE_PREFIX: maxnoragami/gms

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/backend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

      - name: Build and push Edge Engine Image
        uses: docker/build-push-action@v5
        with:
          context: ./firmware/src/gateway/engine
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-edge-engine:latest
